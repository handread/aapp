<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>掌纹观心</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #1a0e2e 0%, #0d0614 50%, #080410 100%);
    font-family: Georgia, 'Times New Roman', serif;
    color: rgba(255,235,195,0.9);
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px 60px;
  }
  .header { text-align: center; padding: 48px 0 32px; }
  .header-sub { font-size: 11px; letter-spacing: .35em; color: rgba(255,200,100,.45); margin-bottom: 12px; text-transform: uppercase; }
  .header h1 { font-size: clamp(28px,6vw,42px); font-weight: 400; letter-spacing: .08em; color: rgba(255,235,195,.95); }
  .header-line { width: 60px; height: 1px; background: linear-gradient(90deg,transparent,rgba(255,200,80,.4),transparent); margin: 16px auto 0; }
  .header p { margin-top: 14px; font-size: 13px; color: rgba(255,200,100,.45); letter-spacing: .06em; line-height: 1.8; }
  .container { width: 100%; max-width: 420px; }
  .upload-zone {
    border: 1px dashed rgba(255,200,80,.25); border-radius: 24px; padding: 52px 24px;
    text-align: center; cursor: pointer; background: rgba(255,200,80,.02);
    margin-bottom: 14px; transition: background .2s;
  }
  .upload-zone:active { background: rgba(255,200,80,.06); }
  .upload-zone .icon { font-size: 36px; margin-bottom: 14px; opacity: .5; }
  .upload-zone .label { font-size: 15px; color: rgba(255,220,150,.6); margin-bottom: 8px; }
  .upload-zone .hint { font-size: 12px; color: rgba(255,200,100,.3); letter-spacing: .06em; }
  .btn-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 14px;
    border: 1px solid rgba(255,200,80,.25); background: transparent;
    color: rgba(255,220,140,.7); font-size: 13px; cursor: pointer;
    letter-spacing: .06em; font-family: Georgia, serif; transition: background .2s;
  }
  .btn:active { background: rgba(255,200,80,.08); }
  .btn-primary {
    border-color: rgba(255,200,80,.5); background: rgba(255,200,80,.1);
    color: rgba(255,220,140,.95); font-size: 15px; letter-spacing: .14em; padding: 16px;
  }
  .btn-ghost { border-color: rgba(255,255,255,.08); color: rgba(255,200,100,.35); }
  .preview-wrap { border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,200,80,.25); margin-bottom: 16px; position: relative; }
  .preview-wrap img { width: 100%; display: block; max-height: 320px; object-fit: cover; }
  .preview-close {
    position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
    border-radius: 50%; border: none; background: rgba(0,0,0,.5);
    color: rgba(255,200,100,.7); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .error-box {
    margin-top: 14px; padding: 12px 16px; border-radius: 12px;
    border: 1px solid rgba(255,100,80,.3); background: rgba(255,80,60,.05);
    font-size: 13px; color: rgba(255,160,140,.8); line-height: 1.6;
  }
  .summary-card {
    background: rgba(255,200,80,.05); border: 1px solid rgba(255,200,80,.2);
    border-radius: 20px; padding: 24px 22px; margin-bottom: 16px; text-align: center;
  }
  .summary-label { font-size: 11px; letter-spacing: .2em; color: rgba(255,200,80,.45); margin-bottom: 10px; }
  .summary-score { font-size: 42px; font-weight: 400; color: rgba(255,220,140,.95); line-height: 1; }
  .summary-score span { font-size: 16px; color: rgba(255,200,80,.4); margin-left: 4px; }
  .summary-divider { width: 40px; height: 1px; background: rgba(255,200,80,.3); margin: 14px auto; }
  .summary-text { font-size: 14px; color: rgba(255,225,175,.75); line-height: 1.85; }
  .readings-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .reading-card {
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,200,100,.2);
    border-radius: 16px; padding: 16px 20px;
  }
  .reading-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .reading-icon { font-size: 14px; color: rgba(255,200,100,.8); }
  .reading-label { font-size: 12px; color: rgba(255,200,100,.6); letter-spacing: .12em; }
  .reading-text { font-size: 14px; color: rgba(255,230,180,.8); line-height: 1.8; }
  .footer { margin-top: 40px; font-size: 11px; color: rgba(255,200,100,.2); letter-spacing: .1em; text-align: center; }
  .loading-wrap { text-align: center; padding: 60px 20px; }
  .loading-text { color: rgba(255,200,100,.5); letter-spacing: .14em; font-size: 14px; margin-bottom: 20px; }
  .loading-dots { display: flex; justify-content: center; gap: 8px; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,200,80,.4); animation: pulse 1.4s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .upload-tips { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .tip-item { font-size: 13px; color: rgba(255,210,120,.7); letter-spacing: .05em; text-align: center; }
  .hidden { display: none !important; }
  .locked-screen {
    text-align: center; padding: 70px 24px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .locked-icon { font-size: 38px; opacity: .5; }
  .locked-title { font-size: 17px; color: rgba(255,220,150,.7); letter-spacing: .12em; }
  .locked-sub { font-size: 13px; color: rgba(255,200,100,.35); letter-spacing: .06em; line-height: 1.9; }

  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,200,80,.2); }
  .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: rgba(255,200,100,.45); font-size: 13px; letter-spacing: .08em; cursor: pointer; font-family: Georgia, serif; transition: all .2s; }
  .tab-btn.active { background: rgba(255,200,80,.12); color: rgba(255,220,140,.95); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .fp-type-badge { text-align: center; padding: 14px 0 6px; font-size: 13px; color: rgba(255,200,80,.7); letter-spacing: .12em; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">命 理 解 读</div>
  <h1>掌纹观心</h1>
  <div class="header-line"></div>
  <p>上传掌纹，解读命运的痕迹</p>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('palm')">🤚 掌纹解读</button>
    <button class="tab-btn" onclick="switchTab('finger')">☝️ 指纹解读</button>
  </div>

  <div id="tab-palm" class="tab-panel active">
  <!-- 上传区 -->
  <div id="section-upload">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">🤚</div>
      <div class="label">点击上传掌纹照片</div>
      <div class="hint">支持 JPG · PNG · WEBP · HEIC</div>
      <div class="upload-tips">
        <div class="tip-item">🖐 整个手掌出镜，四指自然并拢</div>
        <div class="tip-item">🔍 聚焦掌心，确保纹理清晰</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('file-input').click()">选择图片</button>
      <button class="btn" onclick="document.getElementById('camera-input').click()">◉ 拍照</button>
    </div>
    <div class="upload-tips" style="margin-top:10px;">
      <div class="tip-item">💡 光线充足，避免阴影遮挡</div>
    </div>
    <input id="file-input" type="file" accept="image/*" style="display:none" onchange="handleFile(this)">
    <input id="camera-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
  </div>

  <!-- 预览区 -->
  <div id="section-preview" class="hidden">
    <div class="preview-wrap">
      <img id="preview-img" src="" alt="palm">
      <button class="preview-close" onclick="resetAll()">×</button>
    </div>
    <button class="btn btn-primary" style="width:100%;border-radius:16px;margin-bottom:10px;" onclick="analyze()">
      ✦  Beni 开始解读  ✦
    </button>
    <div id="error-box" class="error-box hidden"></div>
  </div>

  <!-- 加载中 -->
  <div id="section-loading" class="hidden">
    <div class="loading-wrap">
      <div class="loading-text" id="loading-text">正在扫描掌纹 ···</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- 结果区 -->
  <div id="section-results" class="hidden">
    <div class="summary-card">
      <div class="summary-label">综合评分</div>
      <div class="summary-score" id="avg-score">—<span>/5</span></div>
      <div class="summary-divider"></div>
      <div class="summary-text" id="summary-text"></div>
    </div>
    <div class="readings-list" id="readings-list"></div>
    <button class="btn btn-ghost" style="width:100%;border-radius:14px;padding:14px;" onclick="resetAll()">
      重新解读
    </button>
  </div>



  </div><!-- end tab-palm -->

  <!-- 指纹 tab -->
  <div id="tab-finger" class="tab-panel">

    <div id="fp-section-upload">
      <div class="upload-zone" onclick="document.getElementById('fp-file-input').click()">
        <div class="icon">☝️</div>
        <div class="label">点击上传拇指指纹照片</div>
        <div class="hint">支持 JPG · PNG · WEBP · HEIC</div>
        <div class="hint" style="margin-top:8px;color:rgba(255,200,100,.45);">请确保拇指指纹清晰完整</div>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="document.getElementById('fp-file-input').click()">选择图片</button>
        <button class="btn" onclick="document.getElementById('fp-camera-input').click()">◉ 拍照</button>
      </div>
      <input id="fp-file-input" type="file" accept="image/*" style="display:none" onchange="fpHandleFile(this)">
      <input id="fp-camera-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="fpHandleFile(this)">
    </div>

    <div id="fp-section-preview" class="hidden">
      <div class="preview-wrap">
        <img id="fp-preview-img" src="" alt="fingerprint">
        <button class="preview-close" onclick="fpReset()">×</button>
      </div>
      <div style="font-size:11px;color:rgba(255,200,100,.35);text-align:center;letter-spacing:.06em;margin-bottom:12px;">拇指指纹清晰可提升识别准确度</div>
      <button class="btn btn-primary" style="width:100%;border-radius:16px;margin-bottom:10px;" onclick="fpAnalyze()">
        ✦  Beni 开始识别  ✦
      </button>
      <div id="fp-error-box" class="error-box hidden"></div>
    </div>

    <div id="fp-section-loading" class="hidden">
      <div class="loading-wrap">
        <div class="loading-text" id="fp-loading-text">正在识别指纹类型 ···</div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div id="fp-section-results" class="hidden">
      <div class="summary-card">
        <div class="summary-label">指纹类型</div>
        <div style="font-size:26px;color:rgba(255,220,140,.95);line-height:1.3;padding:8px 0;" id="fp-type-text">—</div>
        <div class="summary-divider"></div>
      </div>
      <div class="readings-list" id="fp-readings-list"></div>
      <button class="btn btn-ghost" style="width:100%;border-radius:14px;padding:14px;" onclick="fpReset()">
        重新识别
      </button>
    </div>

  </div><!-- end tab-finger -->

</div>

<div class="footer">掌纹如星象，解读仅供参考</div>

<script>
// ⚠️ 修改为你的 HuggingFace Space 地址
const API_URL = "https://benihuang-palm.hf.space/analyze";

// ── 次数限制配置 ──────────────────────────────
const PALM_LIMIT = 1;   // 掌纹可用次数
const FP_LIMIT   = 1;   // 指纹可用次数
const STORAGE_KEY_PALM = 'beni_palm_used';
const STORAGE_KEY_FP   = 'beni_fp_used';

const LOCKED_HTML = `
  <div class="locked-screen">
    <div class="locked-icon">✦</div>
    <div class="locked-title">本次体验已结束</div>
    <div class="locked-sub">每位访客仅限解读一次<br>感谢你的到来 ☽</div>
  </div>`;

function isLocked(key, limit) {
  return parseInt(localStorage.getItem(key) || '0') >= limit;
}
function markUsed(key) {
  localStorage.setItem(key, parseInt(localStorage.getItem(key) || '0') + 1);
}
function lockPanel(uploadId, tabId) {
  document.getElementById(uploadId).innerHTML = LOCKED_HTML;
}

// 页面加载时检查锁定状态
window.addEventListener('DOMContentLoaded', () => {
  if (isLocked(STORAGE_KEY_PALM, PALM_LIMIT)) lockPanel('section-upload');
  if (isLocked(STORAGE_KEY_FP,   FP_LIMIT))   lockPanel('fp-section-upload');
});
// ─────────────────────────────────────────────

const ICONS = ["♡","❋","✦","◈","☽","✿","◉","❖"];
const LOADING_MSGS = [
  "正在扫描掌纹 ···",
  "解析生命线 ···",
  "读取命运轨迹 ···",
  "汇聚星象能量 ···",
  "整合解读内容 ···"
];
let currentFile = null;

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  currentFile = file;
  document.getElementById("preview-img").src = URL.createObjectURL(file);
  show("section-preview");
  hide("section-upload");
  hide("error-box");
}

function resetAll() {
  currentFile = null;
  document.getElementById("preview-img").src = "";
  document.getElementById("file-input").value = "";
  document.getElementById("camera-input").value = "";
  show("section-upload");
  hide("section-preview");
  hide("section-loading");
  hide("section-results");
  hide("error-box");
}

async function analyze() {
  if (!currentFile) return;
  hide("section-preview");
  show("section-loading");

  let msgIdx = 0;
  const loadingEl = document.getElementById("loading-text");
  const timer = setInterval(() => {
    loadingEl.textContent = LOADING_MSGS[msgIdx++ % LOADING_MSGS.length];
  }, 1800);

  try {
    const form = new FormData();
    form.append("file", currentFile);
    const res = await fetch(API_URL, { method: "POST", body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || "服务错误 (" + res.status + ")");
    }
    const data = await res.json();
    clearInterval(timer);
    markUsed(STORAGE_KEY_PALM);
    renderResults(data);
  } catch(e) {
    clearInterval(timer);
    hide("section-loading");
    show("section-preview");
    const box = document.getElementById("error-box");
    box.textContent = e.message || "分析失败，请重试。";
    show("error-box");
  }
}

function renderResults(data) {
  hide("section-loading");

  // 综合评分
  document.getElementById("avg-score").innerHTML =
    (data.average_score || "—") + '<span>/5</span>';
  document.getElementById("summary-text").textContent =
    data.overall_summary || "";

  // 各条解读
  const list = document.getElementById("readings-list");
  list.innerHTML = "";
  const readings = data.readings || [];

  readings.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "reading-card";
    card.innerHTML = `
      <div class="reading-header">
        <span class="reading-icon">${ICONS[i % ICONS.length]}</span>
        <span class="reading-label">${item.label || ""}</span>
      </div>
      <div class="reading-text">${item.text || ""}</div>
    `;
    list.appendChild(card);
  });

  show("section-results");
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }

const FP_API_URL = "https://benihuang-palm.hf.space/analyze-fingerprint";
const FP_LOADING_MSGS = ["正在识别指纹类型 ···","分析纹路特征 ···","匹配指纹数据库 ···","整合解读内容 ···"];
let fpCurrentFile = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='palm'&&i===0)||(tab==='finger'&&i===1)));
  document.getElementById('tab-palm').classList.toggle('active', tab==='palm');
  document.getElementById('tab-finger').classList.toggle('active', tab==='finger');
}

function fpHandleFile(input) {
  const file = input.files[0];
  if (!file) return;
  fpCurrentFile = file;
  document.getElementById("fp-preview-img").src = URL.createObjectURL(file);
  fpShow("fp-section-preview"); fpHide("fp-section-upload"); fpHide("fp-error-box");
}

function fpReset() {
  fpCurrentFile = null;
  document.getElementById("fp-preview-img").src = "";
  document.getElementById("fp-file-input").value = "";
  document.getElementById("fp-camera-input").value = "";
  fpShow("fp-section-upload");
  fpHide("fp-section-preview"); fpHide("fp-section-loading"); fpHide("fp-section-results"); fpHide("fp-error-box");
}

async function fpAnalyze() {
  if (!fpCurrentFile) return;
  fpHide("fp-section-preview"); fpShow("fp-section-loading");
  let msgIdx = 0;
  const loadingEl = document.getElementById("fp-loading-text");
  const timer = setInterval(() => { loadingEl.textContent = FP_LOADING_MSGS[msgIdx++ % FP_LOADING_MSGS.length]; }, 1800);
  try {
    const form = new FormData();
    form.append("file", fpCurrentFile);
    const res = await fetch(FP_API_URL, { method: "POST", body: form });
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.detail || "服务错误 (" + res.status + ")"); }
    const data = await res.json();
    clearInterval(timer);
    markUsed(STORAGE_KEY_FP);
    fpRenderResults(data);
  } catch(e) {
    clearInterval(timer);
    fpHide("fp-section-loading"); fpShow("fp-section-preview");
    const box = document.getElementById("fp-error-box");
    box.textContent = e.message || "识别失败，请重试。";
    fpShow("fp-error-box");
  }
}

function fpRenderResults(data) {
  fpHide("fp-section-loading");
  if (!data.success) {
    fpShow("fp-section-preview");
    const box = document.getElementById("fp-error-box");
    box.textContent = data.message || "识别失败，请重试。";
    fpShow("fp-error-box");
    return;
  }
  document.getElementById("fp-type-text").textContent = data.fingerprint_type || "—";
  const list = document.getElementById("fp-readings-list");
  list.innerHTML = "";
  (data.readings || []).forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "reading-card";
    card.innerHTML = `<div class="reading-header"><span class="reading-icon">${ICONS[i % ICONS.length]}</span><span class="reading-label">${item.label||""}</span></div><div class="reading-text">${item.text||""}</div>`;
    list.appendChild(card);
  });
  fpShow("fp-section-results");
}

function fpShow(id) { document.getElementById(id).classList.remove("hidden"); }
function fpHide(id) { document.getElementById(id).classList.add("hidden"); }

</script>
</body>
</html>
