<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>掌纹观心</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #1a0e2e 0%, #0d0614 50%, #080410 100%);
    font-family: Georgia, 'Times New Roman', serif;
    color: rgba(255,235,195,0.9);
    display: flex; flex-direction: column; align-items: center;
    padding: 0 16px 60px;
  }

  /* HF API URL - 修改为你的实际地址 */

  .header { text-align: center; padding: 48px 0 32px; }
  .header-sub { font-size: 11px; letter-spacing: .35em; color: rgba(255,200,100,.45); margin-bottom: 12px; text-transform: uppercase; }
  .header h1 { font-size: clamp(28px,6vw,42px); font-weight: 400; letter-spacing: .08em; color: rgba(255,235,195,.95); }
  .header-line { width: 60px; height: 1px; background: linear-gradient(90deg,transparent,rgba(255,200,80,.4),transparent); margin: 16px auto 0; }
  .header p { margin-top: 14px; font-size: 13px; color: rgba(255,200,100,.45); letter-spacing: .06em; line-height: 1.8; }

  .container { width: 100%; max-width: 420px; }

  /* Upload Zone */
  .upload-zone {
    border: 1px dashed rgba(255,200,80,.25);
    border-radius: 24px; padding: 52px 24px;
    text-align: center; cursor: pointer;
    background: rgba(255,200,80,.02);
    margin-bottom: 14px; transition: background .2s;
  }
  .upload-zone:active { background: rgba(255,200,80,.06); }
  .upload-zone .icon { font-size: 36px; margin-bottom: 14px; opacity: .5; }
  .upload-zone .label { font-size: 15px; color: rgba(255,220,150,.6); margin-bottom: 8px; }
  .upload-zone .hint { font-size: 12px; color: rgba(255,200,100,.3); letter-spacing: .06em; }

  .btn-row { display: flex; gap: 10px; margin-bottom: 0; }
  .btn {
    flex: 1; padding: 13px;
    border-radius: 14px;
    border: 1px solid rgba(255,200,80,.25);
    background: transparent;
    color: rgba(255,220,140,.7);
    font-size: 13px; cursor: pointer;
    letter-spacing: .06em;
    font-family: Georgia, serif;
    transition: background .2s;
  }
  .btn:active { background: rgba(255,200,80,.08); }
  .btn-primary {
    border-color: rgba(255,200,80,.5);
    background: rgba(255,200,80,.1);
    color: rgba(255,220,140,.95);
    font-size: 15px; letter-spacing: .14em;
    padding: 16px;
  }
  .btn-ghost { border-color: rgba(255,255,255,.08); color: rgba(255,200,100,.35); }

  /* Preview */
  .preview-wrap { border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,200,80,.25); margin-bottom: 16px; position: relative; }
  .preview-wrap img { width: 100%; display: block; max-height: 320px; object-fit: cover; }
  .preview-close {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: rgba(0,0,0,.5);
    color: rgba(255,200,100,.7); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* Error */
  .error-box {
    margin-top: 14px; padding: 12px 16px;
    border-radius: 12px; border: 1px solid rgba(255,100,80,.3);
    background: rgba(255,80,60,.05);
    font-size: 13px; color: rgba(255,160,140,.8); line-height: 1.6;
  }

  /* Results */
  .summary-card {
    background: rgba(255,200,80,.05);
    border: 1px solid rgba(255,200,80,.2);
    border-radius: 20px; padding: 24px 22px;
    margin-bottom: 16px; text-align: center;
  }
  .summary-label { font-size: 11px; letter-spacing: .2em; color: rgba(255,200,80,.45); margin-bottom: 10px; }
  .summary-score { font-size: 42px; font-weight: 400; color: rgba(255,220,140,.95); line-height: 1; }
  .summary-score span { font-size: 16px; color: rgba(255,200,80,.4); margin-left: 4px; }
  .summary-divider { width: 40px; height: 1px; background: rgba(255,200,80,.3); margin: 14px auto; }
  .summary-text { font-size: 14px; color: rgba(255,225,175,.75); line-height: 1.85; }

  .lines-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .line-card {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,200,100,.2);
    border-radius: 16px; padding: 16px 20px;
    cursor: pointer; transition: background .2s;
  }
  .line-card:active { background: rgba(255,255,255,.07); }
  .line-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .line-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .line-icon { font-size: 14px; color: rgba(255,200,100,.8); }
  .line-name { font-size: 12px; color: rgba(255,200,100,.6); letter-spacing: .12em; }
  .line-title { font-size: 15px; font-weight: 500; color: rgba(255,240,210,.95); margin-bottom: 8px; }
  .score-bar { display: flex; gap: 4px; align-items: center; }
  .score-dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,.12); }
  .score-label { font-size: 11px; color: rgba(255,220,150,.7); margin-left: 4px; }
  .line-arrow { color: rgba(255,200,100,.4); font-size: 16px; margin-left: 12px; transition: transform .3s; }
  .line-arrow.open { transform: rotate(180deg); }

  .line-detail { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,200,100,.12); display: none; }
  .line-detail.open { display: block; }
  .line-reading { font-size: 14px; color: rgba(255,230,180,.8); line-height: 1.8; margin-bottom: 12px; }
  .advice-box { background: rgba(255,200,80,.06); border: 1px solid rgba(255,200,80,.2); border-radius: 10px; padding: 10px 14px; }
  .advice-label { font-size: 11px; color: rgba(255,200,80,.5); letter-spacing: .1em; display: block; margin-bottom: 4px; }
  .advice-text { font-size: 13px; color: rgba(255,220,140,.85); line-height: 1.7; }

  .footer { margin-top: 40px; font-size: 11px; color: rgba(255,200,100,.2); letter-spacing: .1em; text-align: center; }

  .hidden { display: none !important; }
  .loading-text { text-align: center; padding: 20px; color: rgba(255,200,100,.5); letter-spacing: .14em; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">命 理 解 读</div>
  <h1>掌纹观心</h1>
  <div class="header-line"></div>
  <p>上传掌纹，解读命运的痕迹</p>
</div>

<div class="container">

  <!-- Upload Section -->
  <div id="section-upload">
    <div id="upload-zone" class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">🤚</div>
      <div class="label">点击上传掌纹照片</div>
      <div class="hint">支持 JPG · PNG · WEBP · HEIC</div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="document.getElementById('file-input').click()">选择图片</button>
      <button class="btn" onclick="document.getElementById('camera-input').click()">◉ 拍照</button>
    </div>
    <input id="file-input" type="file" accept="image/*" style="display:none" onchange="handleFile(this)">
    <input id="camera-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)">
  </div>

  <!-- Preview + Analyze -->
  <div id="section-preview" class="hidden">
    <div class="preview-wrap">
      <img id="preview-img" src="" alt="palm preview">
      <button class="preview-close" onclick="resetAll()">×</button>
    </div>
    <button class="btn btn-primary" style="width:100%;border-radius:16px;" onclick="analyze()">✦  Beni 开始解读  ✦</button>
    <div id="error-box" class="error-box hidden"></div>
  </div>

  <!-- Loading -->
  <div id="section-loading" class="hidden">
    <div class="loading-text" id="loading-text">解读中 ···</div>
  </div>

  <!-- Results -->
  <div id="section-results" class="hidden">
    <div class="summary-card">
      <div class="summary-label">综合评分</div>
      <div class="summary-score" id="avg-score">—<span>/5</span></div>
      <div class="summary-divider"></div>
      <div class="summary-text" id="summary-text"></div>
    </div>
    <div class="lines-list" id="lines-list"></div>
    <button class="btn btn-ghost" style="width:100%;border-radius:14px;padding:14px;" onclick="resetAll()">重新解读</button>
  </div>

</div>

<div class="footer">掌纹如星象，解读仅供参考</div>

<script>
// ⚠️ 修改为你的HuggingFace Space地址
const API_URL = "https://benihuang-palm-reading-api.hf.space/analyze";

const ICONS = ["♡","❋","✦","◈","☽","✿"];
const SCORE_LABELS = ["","微弱","初显","平衡","强盛","极盛"];
let currentFile = null;

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  currentFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById("preview-img").src = url;
  show("section-preview");
  hide("section-upload");
  hide("error-box");
}

function resetAll() {
  currentFile = null;
  document.getElementById("preview-img").src = "";
  document.getElementById("file-input").value = "";
  document.getElementById("camera-input").value = "";
  show("section-upload");
  hide("section-preview");
  hide("section-loading");
  hide("section-results");
  hide("error-box");
}

async function analyze() {
  if (!currentFile) return;
  hide("section-preview");
  hide("error-box");
  show("section-loading");

  const loadingMsgs = ["正在扫描掌纹 ···","解析生命线 ···","读取命运轨迹 ···","汇聚星象能量 ···"];
  let msgIdx = 0;
  const loadingEl = document.getElementById("loading-text");
  const msgInterval = setInterval(() => {
    loadingEl.textContent = loadingMsgs[msgIdx % loadingMsgs.length];
    msgIdx++;
  }, 1800);

  try {
    const form = new FormData();
    form.append("file", currentFile);
    const res = await fetch(API_URL, { method: "POST", body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || "服务错误 (" + res.status + ")");
    }
    const data = await res.json();
    clearInterval(msgInterval);
    renderResults(data);
  } catch (e) {
    clearInterval(msgInterval);
    hide("section-loading");
    show("section-preview");
    const errBox = document.getElementById("error-box");
    errBox.textContent = e.message || "分析失败，请重试。";
    show("error-box");
  }
}

function renderResults(data) {
  hide("section-loading");

  document.getElementById("avg-score").innerHTML = data.average_score + '<span>/5</span>';
  document.getElementById("summary-text").textContent = data.overall_summary;

  const list = document.getElementById("lines-list");
  list.innerHTML = "";
  const lines = Object.values(data.lines);

  lines.forEach((line, i) => {
    const card = document.createElement("div");
    card.className = "line-card";

    // Score bar HTML
    let bars = "";
    for (let j = 0; j < 5; j++) {
      const filled = j < line.score;
      const hue = 30 + j * 15;
      const light = 65 - j * 5;
      bars += `<div class="score-dot" style="${filled ? 'background:hsl('+hue+',70%,'+light+'%)' : ''}"></div>`;
    }

    card.innerHTML = `
      <div class="line-header">
        <div style="flex:1">
          <div class="line-meta">
            <span class="line-icon">${ICONS[i] || "✦"}</span>
            <span class="line-name">${line.display_name}</span>
          </div>
          <div class="line-title">${line.title}</div>
          <div class="score-bar">${bars}<span class="score-label">${SCORE_LABELS[line.score]}</span></div>
        </div>
        <span class="line-arrow" id="arrow-${i}">∨</span>
      </div>
      <div class="line-detail" id="detail-${i}">
        <p class="line-reading">${line.reading}</p>
        <div class="advice-box">
          <span class="advice-label">建议</span>
          <p class="advice-text">${line.advice}</p>
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      const detail = document.getElementById("detail-" + i);
      const arrow = document.getElementById("arrow-" + i);
      detail.classList.toggle("open");
      arrow.classList.toggle("open");
    });

    list.appendChild(card);
  });

  show("section-results");
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }
</script>
</body>
</html>
